services:
  postgres:
    image: postgres:16-alpine
    container_name: daggerheart-fichas-postgres
    environment:
      POSTGRES_DB: daggerheart_fichas
      POSTGRES_USER: daggerheart
      POSTGRES_PASSWORD: daggerheart
    ports:
      - "5432:5432"
    volumes:
      - daggerheart_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U daggerheart -d daggerheart_fichas"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: daggerheart-fichas-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  daggerheart_postgres_data:
