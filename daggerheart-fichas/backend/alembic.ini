[alembic]
script_location = alembic
prepend_sys_path = .
timezone = UTC

# The runtime URL comes from app.core.config.Settings.database_url.
# Keep this placeholder so Alembic has a valid option when tools inspect the file.
sqlalchemy.url = postgresql+asyncpg://daggerheart:daggerheart@localhost:5432/daggerheart_fichas

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
